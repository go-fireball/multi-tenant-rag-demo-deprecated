---
# ============================================================
# Project Requirements Document
# Multi-Tenant RAG Chat Platform
# ============================================================

project:
  name: "Multi-Tenant RAG Chat Platform"
  version: "1.0.0 — PoC"
  status: draft
  created: "2026-04-01"
  authors: ["Platform Engineering"]

# ============================================================
# Overview
# ============================================================

overview:
  description: >
    A multi-tenant conversational RAG (Retrieval-Augmented Generation) platform
    that allows multiple organisations (tenants) to deploy isolated AI chat
    assistants backed by their own knowledge base. Each tenant's assistant
    responds strictly within the bounds of its indexed documentation.
    A single shared codebase serves all tenants — differentiated at runtime
    by tenantId injected as an environment variable into the UI.

  objectives:
    - Single codebase, multiple tenant deployments
    - Per-tenant knowledge base isolation — agents cannot cross tenant boundaries
    - Persistent session and conversation history in Aurora PostgreSQL
    - File upload support within a conversation session (multi-turn)
    - Chat-uploaded files ingested into tenant KB for cross-session search with citations
    - Private-by-default sessions — users opt into shared visibility at session creation
    - Privacy-aware retrieval — private uploads searchable only by owner, shared uploads by all tenant users
    - Guardrails enforce KB-scoped answers only (no hallucination from training data)
    - Fully automated infrastructure provisioning via AWS CDK (TypeScript)
    - Streaming responses for real-time chat UX
    - Simple auth for PoC — no-auth or Google OAuth

  non_goals:
    - Real-time knowledge capture (KaCey-style SME interviewing)
    - BOM extraction or document processing pipelines
    - Multi-agent orchestration (single agent per tenant for PoC)
    - Mobile applications
    - On-premise deployment

# ============================================================
# Key Design Decisions
# ============================================================

decisions:
  - id: DEC-001
    question: "Full TypeScript stack vs .NET backend?"
    decision: "Full TypeScript — Nuxt 4 (UI + server routes) + CDK (TypeScript)"
    rationale: >
      One language across UI, server logic, and infrastructure reduces context-switching.
      Nuxt 4 server routes (powered by h3/Nitro) handle API, SSE streaming, and
      database access within the same process and Docker image — no separate service
      needed. AWS SDK v3 for JavaScript/TypeScript is first-class.
      CDK in TypeScript means infra and app share types and config.
    trade_offs:
      - ".NET is more familiar to existing team — learning curve for Nuxt"
      - "Node.js connection pooling for Aurora needs postgres.js carefully configured"
      - "TypeScript CDK is already the norm — no change needed there"

  - id: DEC-002
    question: "Separate API service or Nuxt server routes?"
    decision: "Nuxt server routes — no separate API service"
    rationale: >
      Nuxt 4 server routes (server/api/*.ts) run inside the same Nitro server
      process as the UI. They support SSE streaming, AWS SDK calls, Aurora
      access, and middleware — everything a separate API would do.
      Each tenant gets one ECS task (one Nuxt deployment) with TENANT_ID env var.
      This eliminates a second Docker image, second ECS service, and cross-service
      network calls. Simpler ops, fewer moving parts for PoC.
      Future: if a mobile app or third-party integration needs the API, extract
      server routes into a standalone Hono or Fastify service at that point.
    trade_offs:
      - "UI and server logic are co-located — less separation of concerns"
      - "Cannot share one API across tenant UIs — each tenant has own Nuxt server"
      - "Scaling UI and API independently is not possible — scale as one unit"

  - id: DEC-003
    question: "tenantId source — URL subdomain, path, or env var?"
    decision: "Environment variable TENANT_ID on each UI deployment for PoC"
    rationale: >
      Each Nuxt 4 ECS task is deployed with a different TENANT_ID env var.
      Same Docker image, different config. Simple, no routing logic needed.
      In production: migrate to subdomain routing (tenant.platform.com) on ALB.
    deployment_model:
      poc: "Separate ECS task per tenant UI, same image, different TENANT_ID — accessible via public ALB"
      production: "Single UI ECS service, ALB listener rules by subdomain"

  - id: DEC-004
    question: "Authentication approach for PoC?"
    decision: "Google OAuth via nuxt-google-auth — lightweight, no corporate IdP needed"
    rationale: >
      No-auth is simplest but provides zero userId for session ownership.
      Google OAuth with nuxt-google-auth takes ~2 hours to configure, gives
      real userId (email), and demonstrates auth readiness without a corporate IdP.
      For true no-auth PoC: userId defaults to a browser-generated UUID stored
      in localStorage.
    options:
      no_auth:
        effort: "30 minutes"
        userId_source: "Browser UUID in localStorage"
        risk: "No user isolation — anyone can see any session if they know sessionId"
      google_oauth:
        effort: "2 hours"
        userId_source: "Google email from JWT"
        risk: "Requires Google OAuth app registration"

  - id: DEC-005
    question: "Session storage — DynamoDB or Aurora?"
    decision: "Aurora PostgreSQL (same cluster as vector store)"
    rationale: >
      Aurora Serverless v2 is already required for Bedrock KB vector storage.
      Using it for sessions avoids a second service. Relational schema is
      simpler to query (history, search, audit). Bedrock KB uses RDS Data API
      (HTTP, stateless) so it does not compete with the Nuxt server connection pool.
      Connection pooling from Nuxt server routes managed by postgres.js pool (max 25).

  - id: DEC-006
    question: "Aurora topology — shared cluster or per-tenant cluster?"
    decision: "Shared Aurora Serverless v2 cluster, separate schema per tenant"
    rationale: >
      One cluster scales to near-zero ACU when idle (dev/PoC cost ~$0).
      Tenant isolation via PostgreSQL schemas (vectors_acme, vectors_contoso, etc.)
      and tenant_id column in app schema tables. Bedrock KB RdsConfiguration
      specifies schema.table per tenant. One cluster, N schemas, one backup.

  - id: DEC-007
    question: "Bedrock Agent per tenant or shared agent with metadata filter?"
    decision: "One Bedrock Agent per tenant"
    rationale: >
      Separate agents provide hard isolation — agent instructions, KB
      association, and guardrails are all scoped per tenant. No risk of
      cross-tenant KB retrieval from misconfigured metadata filter. New tenant
      = new agent in CDK TenantStack loop.

  - id: DEC-008
    question: "Is per-tenant ECS service the right long-term architecture?"
    decision: "Acceptable for PoC — must be revisited before production"
    scaling_note:
      - "Per-tenant ECS service is PoC-only: simple to deploy, easy to isolate for validation"
      - "Production architecture will move to a single shared ECS service with tenant routing"
      - "Tenant resolved via subdomain (acme.platform.example.com) + ALB listener rules in future"
      - "tenantId injected server-side from subdomain match — eliminates N ECS services"
      - "Bedrock Agent isolation and Aurora schema isolation are unaffected by this change"

  - id: DEC-010
    question: "Should chat sessions be private or shared within a tenant?"
    decision: "Private by default, with opt-in shared visibility at session creation"
    rationale: >
      Users may discuss sensitive topics or upload confidential documents in chat.
      Defaulting to private protects user privacy. Users can opt into shared
      visibility when starting a session — shared sessions make their chat history
      browsable by other tenant users, and uploaded files are tagged as shared in
      the Bedrock KB so all tenant users can retrieve them via vector search.
      Private session files are also ingested into the KB but tagged with
      visibility=private + userId — retrieval filters ensure only the owner can
      find them. This lets users search their own uploaded documents in future
      sessions while keeping them hidden from other users.
    visibility_model:
      default: "private"
      options: ["private", "shared"]
      immutability: "Visibility is set at session creation and cannot be changed"
      immutability_rationale: >
        Changing from shared to private after files are KB-indexed would require
        re-tagging metadata in the KB — complex and error-prone. Keeping it
        immutable simplifies the data model.
    private_session:
      chat_history: "Visible only to the owning user"
      uploaded_files: "Ingested into tenant KB with metadata {userId, visibility=private}"
      retrieval_scope: "Owner can retrieve their private docs + all shared docs in the tenant"
    shared_session:
      chat_history: "Browsable by all authenticated users in the same tenant"
      uploaded_files: "Ingested into tenant KB with metadata {userId, visibility=shared}"
      retrieval_scope: "All tenant users can retrieve shared docs via KB search"
    retrieval_filter:
      description: "Applied at query time on every Bedrock KB Retrieve call"
      filter_logic: "(visibility = 'shared') OR (visibility = 'private' AND userId = callerUserId)"
      mechanism: "Bedrock KB metadata filter on RetrieveAndGenerate / Retrieve API"
    ui:
      toggle_location: "New session creation — toggle or dropdown before first message"
      default_state: "Private (pre-selected)"
      indicator: "Session list shows a badge/icon distinguishing private vs shared sessions"
    admin_override: "Out of scope for PoC — future: tenant admin can view all sessions for audit"
    trade_offs:
      - "KB ingestion adds latency after file upload (async ingestion job)"
      - "Metadata filtering adds slight overhead to retrieval queries"
      - "Shared session browsing UI adds frontend scope"

  - id: DEC-009
    question: "Is direct database access acceptable during development?"
    decision: "Yes — authenticated direct DB access is permitted in dev/PoC environments only"
    rationale: >
      Direct Aurora access (via a PostgreSQL client such as psql, TablePlus, or DBeaver)
      removes friction during early development. Schema changes, query debugging, and data
      inspection are significantly faster without going through a service layer.
      This is a speed-for-learning tradeoff, not a weakening of production security standards.
    scope: "dev and PoC environments only — never production"
    guardrails:
      - "Access requires authentication — IAM database authentication or Secrets Manager credentials; no shared passwords"
      - "Connect only to dev/test Aurora cluster — production cluster credentials are never shared with developers"
      - "No real customer or production data in dev/PoC environments"
      - "No cross-tenant schema access unless explicitly granted for a specific test scenario and revoked after"
      - "Prefer read-only roles for exploratory access; use write access only when actively developing schema or seed data"
      - "Access via AWS Session Manager port-forward where possible — avoids exposing Aurora to the public internet"
      - "All connections logged via Aurora audit log (best-effort for PoC; enforced for production)"
    transition:
      trigger: "Before any production deployment or when non-synthetic data enters the system"
      replace_with:
        - "All data access mediated through Nuxt server routes / service layer"
        - "Tenant-aware authorization enforced at service level (tenantId always from server-side config)"
        - "Database credentials restricted to application service account only"
        - "Schema migrations managed via CDK or a migration tool (e.g. node-pg-migrate) — no ad-hoc DDL"
        - "Direct developer access to production Aurora requires a break-glass process with audit trail"

# ============================================================
# Architecture
# ============================================================

architecture:
  diagram: |

    ┌──────────────────────────────────────────────────────────────────┐
    │  Tenant: acme                        Tenant: contoso             │
    │  TENANT_ID=acme                      TENANT_ID=contoso           │
    │  Nuxt 4 (UI + server routes)         Nuxt 4 (UI + server routes) │
    │  ECS Fargate task                    ECS Fargate task            │
    │  acme.platform.example.com           contoso.platform.example.com│
    │                                                                  │
    │  server/api/chat.post.ts    ←──────── All API logic lives here   │
    │  server/api/sessions.get.ts           Same Docker image          │
    │  server/api/sessions.post.ts          Different TENANT_ID env    │
    └──────────┬───────────────────────────────────┬───────────────────┘
               │                                   │
               ↓                                   ↓
    ┌──────────────────────┐           ┌───────────────────────┐
    │  Bedrock Agent       │           │  Aurora Serverless v2 │
    │  (per tenant)        │           │  (shared cluster)     │
    │                      │           │                       │
    │  acme-agent          │           │  schema: app          │
    │  contoso-agent       │           │    sessions           │
    │                      │           │    messages           │
    │  ↓ KB Retrieval      │           │                       │
    │  ↓ Guardrails        │           │  schema: vectors_acme │
    │  ↓ 1hr session mem   │           │    bedrock_kb         │
    └──────────┬───────────┘           │                       │
               ↓                       │  schema: vectors_cont │
    ┌──────────────────────┐           │    bedrock_kb         │
    │  Bedrock KB          │           └───────────────────────┘
    │  (per tenant)        │
    │  acme-kb / cont-kb   │
    │  ↑ RDS Data API      │
    └──────────┬───────────┘
               ↓
    ┌───────────────────────┐
    │  S3 Buckets           │
    │  (per tenant)         │
    │  acme-docs / cont-docs│
    └───────────────────────┘

  components:
    nuxt_app:
      name: "Nuxt 4 (UI + Server Routes)"
      runtime: "Node.js 22 (SSR via Nitro)"
      deployment: "ECS Fargate — one task per tenant"
      image: "Same Docker image, different TENANT_ID env var"
      ui: "Vue 3 pages + components (Nuxt UI v3 / shadcn-vue)"
      server: "Nitro server routes in server/api/ — Bedrock, Aurora, SSE"

    bedrock_agents:
      description: "One agent per tenant"
      model: "anthropic.claude-3-haiku-20240307-v1:0"
      session_ttl: "1 hour (active working memory)"

    bedrock_kb:
      description: "One KB per tenant"
      embedding_model: "amazon.titan-embed-text-v2:0"
      vector_dimensions: 1024
      vector_store: "Aurora pgvector (per-tenant schema)"

    guardrails:
      description: "Shared guardrail policy (can be overridden per tenant)"
      grounding_threshold: 0.75
      relevance_threshold: 0.75

    database:
      engine: "Aurora Serverless v2 (PostgreSQL 16)"
      min_acu: 0
      max_acu: 4
      topology: "Shared cluster, separate schemas per tenant"
      access:
        api: "postgres.js connection pool (max 25, TCP)"
        bedrock_kb: "RDS Data API (HTTP, stateless)"

    storage:
      description: "One S3 bucket per tenant for documents"

# ============================================================
# Frontend Requirements
# ============================================================

frontend:
  framework:
    name: "Nuxt 4"
    version: "4.x"
    mode: "SSR (server-side rendering via Nitro — required)"
    mode_rationale: >
      SSR is not optional. Nuxt server routes (server/api/*.ts) run inside the
      Nitro server process and require SSR mode. Google OAuth session handling
      (nuxt-google-auth) also requires a server process. SPA mode cannot host
      server routes.
    ui_library: "Nuxt UI v3 (Tailwind-based) or shadcn-vue"
    state: "Pinia"
    http: "native fetch() for POST streaming; useFetch / $fetch for standard requests"

  tenant_configuration:
    source: "Runtime environment variable"
    variable: "NUXT_PUBLIC_TENANT_ID"
    usage: >
      Read in nuxt.config.ts runtimeConfig.public.tenantId.
      Available server-side via useRuntimeConfig() in all server routes.
      No request header needed — tenantId is baked into the deployment env var.
    example:
      nuxt_config: |
        export default defineNuxtConfig({
          runtimeConfig: {
            // Server-only (not exposed to browser)
            databaseUrl: process.env.DATABASE_URL,
            bedrockRegion: process.env.AWS_REGION ?? 'us-east-1',
            tenantConfig: process.env.TENANT_CONFIG,
            public: {
              // Exposed to browser
              tenantId: process.env.NUXT_PUBLIC_TENANT_ID ?? 'default',
              tenantDisplayName: process.env.NUXT_PUBLIC_TENANT_NAME ?? 'Assistant',
            }
          }
        })

  pages:
    - path: "/"
      name: "Chat"
      description: >
        Main chat interface. Left panel shows session history list.
        Right panel shows active conversation with streaming message rendering.
    - path: "/sessions"
      name: "History"
      description: "List of past conversations for current user. Click to load."

  components:
    ChatWindow:
      description: "Active conversation message thread"
      features:
        - "Streaming token render (SSE consumer)"
        - "User / assistant message bubbles"
        - "Source citations expandable panel per answer"
        - "Copy to clipboard per message"
        - "Scroll-to-bottom on new message"
    MessageInput:
      description: "User text input area"
      features:
        - "Multiline textarea"
        - "Send on Enter (Shift+Enter for newline)"
        - "File attachment button (PDF, DOCX, images)"
        - "Disabled + spinner while streaming"
    SessionSidebar:
      description: "Session/conversation list"
      features:
        - "List of sessions for current userId (own sessions tab)"
        - "Shared sessions tab — browse shared sessions from other tenant users (read-only)"
        - "Session title (first question, truncated)"
        - "Visibility badge (lock icon for private, globe icon for shared)"
        - "New conversation button — opens with visibility toggle (default: private)"
        - "Delete session (own sessions only)"
    FileUpload:
      description: "Attach files to current message — uploaded separately, referenced by fileId"
      upload_flow:
        - "Client selects file(s) — validated client-side before upload"
        - "POST /api/files (separate upload endpoint) → file stored in S3, metadata in Aurora"
        - "Server returns fileId (UUID) per file"
        - "fileId(s) included in POST /api/chat request body (not raw bytes)"
        - "Chat server resolves fileId and passes S3 source reference to Bedrock"
      constraints:
        max_files_per_message: 5
        max_file_size_per_file: "10MB (Bedrock Agent hard limit per file)"
        max_total_upload_size: "25MB per message (sum of all files)"
        supported_types:
          documents: ["PDF", "DOCX", "DOC", "TXT", "HTML", "CSV", "XLSX", "MD"]
          images:    ["PNG", "JPEG", "JPG", "GIF", "WEBP"]
        validation:
          - "MIME type validated server-side against allowed list (not just extension)"
          - "Filename sanitized: strip path separators, control characters, limit to 100 chars"
          - "Ownership validated: fileId must belong to same tenantId + userId before use"
          - "Reject with 400 if any constraint violated — do not partially process"
      storage:
        strategy: "Persistent session attachments — S3 + Aurora metadata + KB ingestion"
        s3_key_pattern: "s3://tenant-files-{env}/{tenantId}/{userId}/{sessionId}/{fileId}/{sanitizedFileName}"
        s3_bucket: "Single shared bucket per environment (tenant-files-prod, tenant-files-dev)"
        s3_object_metadata: "userId, sessionId, visibility, fileId — used by KB ingestion for metadata tagging"
        aurora_table: "app.session_files (see database schema)"
        kb_ingestion: >
          After upload, files are asynchronously ingested into the tenant Bedrock KB.
          KB metadata includes userId, sessionId, visibility, and fileId.
          This enables cross-session vector search with visibility-based access control.
          Files are immediately usable in the current session via S3 session-state references
          (before KB ingestion completes).
        lifecycle: >
          S3 lifecycle rule expires objects after 90 days. Aurora CASCADE deletes on
          session delete. On S3 expiry, corresponding KB entries should be cleaned up
          (re-sync KB data source or manual cleanup job).
        iam: "ECS task role scoped to s3:PutObject + s3:GetObject on own tenantId prefix only"
      session_limits:
        max_files_per_session: 20
        max_total_size_per_session: "200MB"
        enforcement:
          - "Reject /api/files upload if per-session file count ≥ 20"
          - "Reject if cumulative size_bytes for session ≥ 200MB"
          - "Return HTTP 422 with descriptive error message"
      cleanup:
        orphan_files:
          definition: "Files uploaded (status=ready) but not linked to any message_id after 24 hours"
          policy:
            - "Scheduled job runs daily: DELETE FROM app.session_files WHERE message_id IS NULL AND created_at < NOW() - INTERVAL '24 hours'"
            - "Also delete corresponding S3 objects before DB delete"
        expired_files:
          - "S3 lifecycle rule: expire objects under tenant-files-{env}/ after 90 days"
          - "Aurora cleanup job: DELETE FROM app.session_files WHERE expires_at < NOW()"
      multi_turn_behaviour: >
        On every InvokeAgent call, server queries Aurora for session_files belonging
        to that sessionId. To prevent performance degradation on long sessions, only
        a bounded set is passed to Bedrock per the file_usage_policy below.
      file_usage_policy:
        max_files_per_request: 5
        selection_strategy:
          - "Most recently uploaded files first (order by created_at DESC)"
          - "Future: relevance-based selection using query similarity"
        rationale: >
          Large session file sets can degrade latency and exceed Bedrock session state
          limits. Bounding the per-request file set keeps performance predictable.
      presigned_urls: >
        When loading message history, server generates S3 presigned GET URLs
        (60 min TTL) for each file. Displayed as download links in the message thread.
      virus_scanning: "Not implemented for PoC. Add S3 event → Lambda → ClamAV/GuardDuty scan before production."
      ui_behaviour:
        - "Show attached filename + size badge before send"
        - "Allow remove before send"
        - "Show per-file upload progress while POST /api/files is in flight"
        - "Disable attach button if file exceeds 10MB — show error inline"
        - "Render download link for each attachment in message history"

  streaming:
    protocol: "HTTP chunked transfer — POST /api/chat returns text/event-stream"
    client_pattern: "fetch() POST + ReadableStream reader (NOT EventSource)"
    reason: >
      EventSource is a browser GET API — it cannot send a request body.
      Since chat requests include a question, sessionId, userId, and optional
      file bytes, the request must be a POST. The server responds with
      Content-Type: text/event-stream and streams chunks. The client reads
      the response body as a ReadableStream.
    server_route: "server/api/chat.post.ts — uses createEventStream() from h3"
    consumer: |
      // composables/useChat.ts
      async function sendMessage(payload: ChatRequest) {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        })

        const reader = response.body!.getReader()
        const decoder = new TextDecoder()

        while (true) {
          const { done, value } = await reader.read()
          if (done) break
          // Each line is: data: {...}\n\n
          const lines = decoder.decode(value).split('\n').filter(l => l.startsWith('data: '))
          for (const line of lines) {
            const chunk = JSON.parse(line.slice(6))
            if (chunk.type === 'token')   appendToken(chunk.text)
            if (chunk.type === 'sources') setSources(chunk.sources)
            if (chunk.type === 'done')    setComplete(chunk.sessionId)
            if (chunk.type === 'error')   setError(chunk.message)
          }
        }
      }
    reconnect_note: >
      fetch()-based streaming does not auto-reconnect on network drop.
      Implement manual retry with exponential backoff in useChat composable.
      Show "Reconnecting..." UI state on error. On reconnect, pass the
      existing sessionId so the conversation context is preserved.

  auth:
    poc_option_a_no_auth:
      userId_source: "localStorage UUID — generated on first visit"
      implementation: |
        // composables/useUser.ts
        const userId = useLocalStorage('userId', () => crypto.randomUUID())
      effort: "30 minutes"

    poc_option_b_google_oauth:
      package: "nuxt-google-auth"
      provider: "google"
      userId_source: "Google email from session"
      setup:
        - "npm install nuxt-google-auth"
        - "Add NUXT_OAUTH_GOOGLE_CLIENT_ID and NUXT_OAUTH_GOOGLE_CLIENT_SECRET env vars"
        - "Register OAuth app at console.cloud.google.com"
        - "Protect /chat route with middleware"
      effort: "2 hours"
    recommended: "poc_option_b_google_oauth (shows production intent)"

# ============================================================
# Server Routes (Nuxt server/api/)
# ============================================================

server_routes:
  runtime: "Nitro (h3) — same process as Nuxt SSR"
  note: >
    No separate API service. All backend logic lives in server/api/ within
    the Nuxt project. Each tenant's Nuxt deployment has its own server process.
    tenantId is read from server-side runtimeConfig (NUXT_PUBLIC_TENANT_ID env var)
    — not from a request header. No cross-tenant risk.

  project_structure: |
    ui/
    ├── app/                          # Nuxt 4 UI (Vue 3)
    │   ├── pages/
    │   │   ├── index.vue             # Chat interface
    │   │   └── sessions.vue          # Conversation history
    │   ├── components/
    │   │   ├── ChatWindow.vue
    │   │   ├── MessageInput.vue
    │   │   ├── MessageBubble.vue
    │   │   └── SessionSidebar.vue
    │   ├── composables/
    │   │   ├── useChat.ts            # SSE stream consumer
    │   │   ├── useSession.ts         # Load / switch sessions
    │   │   └── useUser.ts            # userId (OAuth or UUID)
    │   └── app.vue
    ├── server/
    │   ├── api/
    │   │   ├── chat.post.ts          # POST /api/chat — SSE stream
    │   │   ├── sessions/
    │   │   │   ├── index.get.ts      # GET  /api/sessions
    │   │   │   ├── index.post.ts     # POST /api/sessions
    │   │   │   └── [id].delete.ts    # DELETE /api/sessions/:id
    │   │   └── sessions/
    │   │       └── [id]/
    │   │           └── messages.get.ts  # GET /api/sessions/:id/messages
    │   ├── services/
    │   │   ├── bedrock.ts            # InvokeAgent + stream parsing
    │   │   ├── session.ts            # Aurora read/write
    │   │   └── tenant.ts             # Load agent config from runtimeConfig
    │   ├── db/
    │   │   ├── client.ts             # postgres.js pool (singleton)
    │   │   └── queries.ts            # Typed SQL
    │   └── middleware/
    │       └── auth.ts               # Google OAuth session check (if enabled)
    ├── nuxt.config.ts
    ├── Dockerfile
    └── package.json

  endpoints:
    - method: POST
      path: "/api/chat"
      description: "Send a chat message; response streams as text/event-stream"
      request_body:
        sessionId: "UUID | null (null = create new session on server)"
        userId: "string (email or browser UUID)"
        question: "string (max 8000 chars)"
        fileIds:
          - "UUID  -- references app.session_files; uploaded separately via POST /api/files"
      response:
        status: 200
        content_type: "text/event-stream"
        transfer_encoding: "chunked"
        format: "Each line: data: {json}\\n\\n"
      sse_events:
        token:   '{ "type": "token",   "text": "..." }'
        sources: '{ "type": "sources", "sources": [{ "name":"...", "url":"...", "score":0.92 }] }'
        done:    '{ "type": "done",    "sessionId": "...", "messageId": "..." }'
        error:   '{ "type": "error",   "message": "..." }'
      flow: |
        1.  Read tenantId from useRuntimeConfig().public.tenantId (server-side)
        2.  Load tenant config → { agentId, agentAliasId } from runtimeConfig
        3.  If sessionId null → INSERT new session row to Aurora → get new sessionId
        4.  If fileIds present:
            a. Load file metadata from app.session_files WHERE file_id IN (fileIds)
            b. Validate ownership: each file must match tenantId + userId + sessionId
            c. Reject with 403 if any file fails ownership check
        5.  Query Aurora for session_files for this sessionId, ORDER BY created_at DESC
            Select up to max_files_per_request (5) using file_usage_policy selection_strategy
        6.  Call BedrockAgentRuntime.InvokeAgentCommand:
            - inputText: question
            - sessionState.files: selected files via S3 source reference (not byte content)
        7.  Set Content-Type: text/event-stream, Transfer-Encoding: chunked
        8.  For each chunk from Bedrock stream → write "data: {type:token, text}\n\n"
        9.  After stream ends → extract citations → write "data: {type:sources, ...}\n\n"
        10. INSERT user message + assistant response to Aurora app.messages
        11. UPDATE app.session_files SET message_id = new messageId WHERE file_id IN (fileIds)
        12. Write "data: {type:done, sessionId, messageId}\n\n"
        13. Close response stream
      retrieval_context_note:
        - "KB retrieval follows rag_strategy settings: semantic retrieval (top_k=12) → Bedrock reranking → top 5 chunks"
        - "KB retrieval applies metadata filter: (visibility='shared') OR (visibility='private' AND userId=callerUserId)"
        - "This ensures users can search their own private uploads + all shared uploads across sessions"
        - "User-attached files passed via sessionState.files are supplemental session-scoped evidence (immediate, pre-ingestion)"
        - "Final answer must remain grounded in retrieved KB content and/or attached file evidence — no external knowledge"
        - "Both evidence channels are governed by the same strict grounding policy (guardrail grounding_threshold=0.75)"
        - "AI returns citations with S3 source paths for KB-retrieved documents — users can trace answers to source files"
      implementation_sketch: |
        // server/api/chat.post.ts
        import { BedrockAgentRuntimeClient, InvokeAgentCommand }
          from '@aws-sdk/client-bedrock-agent-runtime'
        import { createEventStream, sendEventStream } from 'h3'

        export default defineEventHandler(async (event) => {
          const config  = useRuntimeConfig()
          const body    = await readBody(event)

          const { agentId, agentAliasId } = getTenantConfig(config)
          const sessionId = body.sessionId ?? await createSession(body.userId)

          // Select up to 5 most-recent session files; pass via S3 reference (no byte download)
          const selectedFiles = await getSessionFiles(sessionId, config.public.tenantId, { limit: 5 })
          const sessionStateFiles = selectedFiles.map((f) => ({
            name: f.sanitizedName,
            source: {
              sourceType: 'S3',
              s3Location: {
                uri: `s3://${f.s3Bucket}/${f.s3Key}`
              }
            }
          }))

          const stream = createEventStream(event)
          sendEventStream(event, stream)

          const client = new BedrockAgentRuntimeClient({ region: config.bedrockRegion })
          const cmd = new InvokeAgentCommand({
            agentId, agentAliasId, sessionId,
            inputText: body.question,
            sessionState: sessionStateFiles.length
              ? { files: sessionStateFiles }
              : undefined
          })

          const fullText = new StringBuilder()
          const response = await client.send(cmd)

          for await (const evt of response.completion) {
            if (evt.chunk?.bytes) {
              const text = new TextDecoder().decode(evt.chunk.bytes)
              fullText.append(text)
              await stream.push({ data: JSON.stringify({ type: 'token', text }) })
            }
          }

          const sources = extractCitations(response)
          if (sources.length)
            await stream.push({ data: JSON.stringify({ type: 'sources', sources }) })

          const messageId = await saveMessages(sessionId, body.question, fullText.toString(), sources)
          if (body.fileIds?.length)
            await linkFilesToMessage(body.fileIds, messageId)

          await stream.push({ data: JSON.stringify({ type: 'done', sessionId, messageId }) })
          await stream.close()
        })

      file_transfer_optimization:
        - "S3 source reference passed directly to Bedrock — no byte download to server"
        - "Reduces per-request memory pressure and latency on Nitro process"
        - "Requires Bedrock Agent execution role to have s3:GetObject on tenant-files-{env}/{tenantId}/* prefix"

    - method: GET
      path: "/api/sessions"
      query_params:
        userId: "string"
        limit: "integer (default 20)"
        offset: "integer (default 0)"
        filter: "string (optional) — 'own' (default), 'shared', 'all'"
      description: >
        Returns sessions for the current user. filter='own' returns only the user's
        sessions (private + shared). filter='shared' returns all shared sessions in
        the tenant (from any user). filter='all' returns own + shared from others.
      response:
        sessions:
          - sessionId: "UUID"
            title: "string"
            visibility: "string — 'private' or 'shared'"
            userId: "string — session owner (useful when viewing shared sessions)"
            createdAt: "ISO 8601"
            lastActive: "ISO 8601"
            messageCount: "integer"

    - method: POST
      path: "/api/sessions"
      request_body:
        userId: "string"
        visibility: "string (optional, default 'private') — 'private' or 'shared'"
      response:
        sessionId: "UUID"
        visibility: "string — 'private' or 'shared'"

    - method: GET
      path: "/api/sessions/:id/messages"
      response:
        messages:
          - messageId: "UUID"
            role: "user | assistant"
            content: "string"
            sources: "array | null"
            createdAt: "ISO 8601"

    - method: DELETE
      path: "/api/sessions/:id"
      response: "204 No Content"

    - method: POST
      path: "/api/files"
      description: "Upload file(s) for a session — stored in S3, metadata in Aurora"
      request_body: "multipart/form-data"
      fields:
        sessionId: "UUID"
        userId: "string"
        files: "multipart file(s) — max 5, each ≤ 10MB"
      flow: |
        1. Validate each file: MIME type, size ≤ 10MB, count ≤ 5
        2. Look up session visibility from app.sessions WHERE session_id = sessionId
        3. For each file:
           a. Generate fileId = UUID
           b. Sanitize filename
           c. Upload to S3: tenant-files-{env}/{tenantId}/{userId}/{sessionId}/{fileId}/{sanitizedName}
              — include S3 object metadata tags: userId, sessionId, visibility (from session)
           d. INSERT into app.session_files (status='ready', visibility=session.visibility,
              kb_ingestion_status='pending', s3_key, metadata, expires_at=NOW()+90d)
        4. Trigger async KB ingestion: add file's S3 location to tenant KB data source
           and call StartIngestionJob (or queue for batch ingestion)
           — KB metadata includes: userId, sessionId, visibility, fileId
           — On ingestion complete: UPDATE session_files SET kb_ingestion_status='ingested'
        5. Return array of fileIds
      kb_ingestion_note: >
        Files are immediately usable in the current session via session-state S3 references
        (step is unchanged from current flow). KB ingestion runs asynchronously so the file
        becomes searchable in future sessions once ingestion completes. The AI can cite
        KB-ingested files by their S3 source path in the citation.
      response:
        files:
          - fileId: "UUID"
            originalName: "string"
            contentType: "string"
            sizeBytes: "integer"

    - method: GET
      path: "/api/files/:fileId/url"
      description: "Get presigned S3 URL for downloading an attachment"
      flow: |
        1. Load file from app.session_files WHERE file_id = fileId
        2. Validate ownership: tenantId + userId must match
        3. Generate presigned GET URL (60 min TTL)
        4. Return URL
      response:
        url: "string (presigned S3 GET URL, 60 min TTL)"

  tenant_config:
    description: >
      tenantId is baked into the deployment via NUXT_PUBLIC_TENANT_ID env var.
      Agent config (agentId, agentAliasId) is read from server-side runtimeConfig
      TENANT_CONFIG env var. No request header needed — tenantId cannot be spoofed
      by a browser caller because it is resolved server-side.
    env_vars:
      NUXT_PUBLIC_TENANT_ID: "acme"
      NUXT_PUBLIC_TENANT_NAME: "Acme Assistant"
      TENANT_CONFIG: |
        {
          "acme":    { "agentId": "ABCD1234", "agentAliasId": "ALIAS001", "guardrailId": "GUAR001" },
          "contoso": { "agentId": "EFGH5678", "agentAliasId": "ALIAS002", "guardrailId": "GUAR001" }
        }
      DATABASE_URL: "postgresql://user:pass@aurora-cluster/chatplatform"
      AWS_REGION: "us-east-1"

  database_access:
    package: "postgres (postgres.js v3)"
    singleton_pattern: >
      postgres.js client initialised once in server/db/client.ts using
      Nitro's useStorage or module-level singleton — reused across requests.
    pool_config:
      max: 25
      idle_timeout: 30
      connect_timeout: 10

# ============================================================
# Database Design
# ============================================================

database:
  engine: "Aurora Serverless v2"
  postgres_version: 16
  extensions:
    - "pgvector"
    - "pg_trgm (optional — fuzzy text search)"

  schemas:
    app:
      description: "Shared application data — all tenants, scoped by tenant_id"
      tables:
        sessions:
          columns:
            session_id:   "UUID PRIMARY KEY DEFAULT gen_random_uuid()"
            tenant_id:    "VARCHAR(50) NOT NULL"
            user_id:      "VARCHAR(255) NOT NULL"
            title:        "VARCHAR(500)"
            visibility:   "VARCHAR(10) NOT NULL DEFAULT 'private' CHECK (visibility IN ('private','shared'))"
            created_at:   "TIMESTAMPTZ NOT NULL DEFAULT NOW()"
            last_active:  "TIMESTAMPTZ NOT NULL DEFAULT NOW()"
          indexes:
            - "idx_sessions_tenant_user ON (tenant_id, user_id, last_active DESC)"
            - "idx_sessions_tenant_shared ON (tenant_id, visibility, last_active DESC) WHERE visibility = 'shared'"

        messages:
          columns:
            message_id:   "UUID PRIMARY KEY DEFAULT gen_random_uuid()"
            session_id:   "UUID NOT NULL REFERENCES app.sessions(session_id) ON DELETE CASCADE"
            role:         "VARCHAR(20) NOT NULL CHECK (role IN ('user','assistant'))"
            content:      "TEXT NOT NULL"
            sources:      "JSONB"
            created_at:   "TIMESTAMPTZ NOT NULL DEFAULT NOW()"
          indexes:
            - "idx_messages_session ON (session_id, created_at ASC)"

        session_files:
          columns:
            file_id:        "UUID PRIMARY KEY DEFAULT gen_random_uuid()"
            session_id:     "UUID NOT NULL REFERENCES app.sessions(session_id) ON DELETE CASCADE"
            message_id:     "UUID REFERENCES app.messages(message_id) ON DELETE SET NULL"
            tenant_id:      "VARCHAR(50) NOT NULL"
            user_id:        "VARCHAR(255) NOT NULL"
            original_name:  "VARCHAR(500) NOT NULL"
            sanitized_name: "VARCHAR(500) NOT NULL"
            content_type:   "VARCHAR(100) NOT NULL"
            size_bytes:     "INTEGER NOT NULL"
            s3_bucket:      "VARCHAR(255) NOT NULL"
            s3_key:         "TEXT NOT NULL  -- {tenantId}/{userId}/{sessionId}/{fileId}/{sanitizedFileName}"
            status:         "VARCHAR(20) NOT NULL DEFAULT 'ready' CHECK (status IN ('uploading','ready','expired'))"
            visibility:     "VARCHAR(10) NOT NULL DEFAULT 'private' CHECK (visibility IN ('private','shared'))  -- inherited from session at upload time"
            kb_ingestion_status: "VARCHAR(20) NOT NULL DEFAULT 'pending' CHECK (kb_ingestion_status IN ('pending','ingesting','ingested','failed'))"
            created_at:     "TIMESTAMPTZ NOT NULL DEFAULT NOW()"
            expires_at:     "TIMESTAMPTZ  -- set to NOW() + 90 days on insert"
          indexes:
            - "idx_session_files_session ON (session_id, created_at ASC)"
            - "idx_session_files_tenant_user ON (tenant_id, user_id)"
            - "idx_session_files_kb_pending ON (tenant_id, kb_ingestion_status) WHERE kb_ingestion_status = 'pending'"

    vectors_per_tenant:
      description: >
        One schema per tenant, created by CDK TenantStack setup Lambda.
        Schema name pattern: vectors_{tenantId}
        e.g. vectors_acme, vectors_contoso
      table: "bedrock_kb"
      columns:
        id:        "UUID PRIMARY KEY"
        embedding: "vector(1024)"
        chunks:    "TEXT"
        metadata:  "JSON"
      indexes:
        - "USING hnsw (embedding vector_cosine_ops)"
        - "USING gin (to_tsvector('simple', chunks))  -- hybrid search"
      note: >
        Bedrock KB RdsConfiguration points to this table.
        embedding dimensions must match Titan Embed Text v2 (1024-dim).
        Note: titan-embed-text-v2 outputs 1024 dims (not 1536 like g1).
        Existing apps use g1 (1536) — new platform uses v2 (1024, higher quality).

# ============================================================
# Bedrock Configuration
# ============================================================

bedrock:
  region: "us-east-1"

  embedding_model:
    id: "amazon.titan-embed-text-v2:0"
    dimensions: 1024
    note: "Upgraded from titan-embed-g1-text-02 (1536-dim) — v2 is higher quality"

  agent:
    foundation_model: "anthropic.claude-3-haiku-20240307-v1:0"
    description: "One agent per tenant. Defined in CDK TenantStack."
    session_ttl_seconds: 3600
    instructions_template: |
      You are a helpful assistant for {tenantDisplayName}.
      You answer questions ONLY based on the information in your knowledge base.
      If a question cannot be answered from the knowledge base, respond:
      "I don't have information about that in the {tenantDisplayName} knowledge base."
      Always cite the source document when providing an answer.
      If the question is ambiguous, ask a clarifying question before answering.
    guardrail_association: "Required — attach guardrailId to agent"
    iam:
      execution_role_policies:
        - "bedrock:InvokeModel on foundation model ARN"
        - "bedrock:Retrieve on own KB ARN only"
        - "s3:GetObject on tenant-files-{env}/{tenantId}/* (required for S3 file source references)"

  knowledge_base:
    description: "One KB per tenant, backed by per-tenant Aurora schema"
    data_source_type: "S3"
    sync_schedule: "rate(1 day)"
    rds_configuration:
      database_name: "chatplatform"
      table_name: "vectors_{tenantId}.bedrock_kb"
      field_mapping:
        primary_key: "id"
        vector_field: "embedding"
        text_field:   "chunks"
        metadata_field: "metadata"
    retrieval_notes:
      - "Aurora pgvector backend is used in semantic retrieval mode for this PoC"
      - "Hybrid lexical + semantic retrieval is not enabled — GIN index exists but is unused"
      - "Bedrock-managed reranking is enabled to improve precision after semantic retrieval"
      - "Retrieval quality is governed explicitly by the RAG Retrieval & Relevance Strategy section"
      - "Chat-uploaded files are ingested into the KB with metadata: userId, sessionId, visibility, fileId"
      - "Retrieval applies metadata filter: (visibility='shared') OR (visibility='private' AND userId=caller)"
      - "This enables cross-session document search — users can find their own private uploads and all shared uploads"
      - "Citations include S3 source paths so users can trace answers to the original uploaded file"

  guardrails:
    description: "Shared guardrail — applied to all agents"
    contextual_grounding:
      grounding_threshold: 0.75
      relevance_threshold: 0.75
    denied_topics:
      - name: "off_topic"
        definition: "Questions unrelated to the tenant's business domain and documentation"
        type: "DENY"
      - name: "personal_advice"
        definition: "Personal, legal, or medical advice"
        type: "DENY"
    grounding_failure_response: >
      I can only answer questions based on the available documentation.
      I don't have information about that topic in my knowledge base.
    pii_filter: "BLOCK"

# ============================================================
# RAG Retrieval & Relevance Strategy
# ============================================================

rag_strategy:
  description: >
    Defines how tenant-specific documents are ingested, retrieved, reranked,
    and assembled into context for generation. This section makes retrieval
    behavior explicit rather than relying on default Bedrock behavior.

  goals:
    - "Maximize answer relevance from tenant-specific knowledge base content"
    - "Minimize hallucination by strictly grounding responses in retrieved evidence"
    - "Provide predictable, explainable, and testable retrieval behavior"
    - "Keep retrieval strategy simple for PoC while leaving room for future tuning"

  tenant_isolation:
    model: "Resource isolation"
    rules:
      - "Each tenant has its own Bedrock Knowledge Base"
      - "Each tenant has its own Bedrock Agent"
      - "No shared KB with metadata filtering for primary tenant isolation"
      - "Cross-tenant retrieval is prevented by resource separation, not request-time filtering"

  chunking:
    strategy: "semantic"
    rationale: >
      Semantic chunking preserves meaning across natural language boundaries
      and is better suited to enterprise documents such as manuals, SOPs, policy
      documents, long-form PDFs, and mixed-format operational content.
    ingestion_note: >
      Chunking strategy is defined at knowledge base data source creation time.
      Changing it later requires recreation or reconfiguration of the data source
      and re-ingestion of all content.
    chunk_size_guidance:
      target_tokens: "500–1000"
      overlap: "10–20%"
      note: >
        Exact values may be tuned during ingestion testing, but chunk boundaries
        should preserve semantic coherence and avoid splitting definitions,
        procedures, or tabular explanations across unrelated chunks.
    future_options:
      - "Hierarchical chunking may be evaluated later for highly structured documents"
      - "Fixed-size chunking may be considered for simpler or highly regular corpora"

  retrieval:
    mode: "semantic"
    top_k_candidates: 12
    rationale: >
      Retrieve a moderately broad candidate set to improve recall before reranking.
      Aurora pgvector backend is treated as semantic-only for this PoC.
    tenant_scope:
      - "Retrieval occurs only within the tenant's dedicated Knowledge Base"
    query_handling:
      - "Original user query is passed to Bedrock Agent as-is for PoC"
      - "Future enhancement: query rewriting for ambiguous or underspecified prompts"

  reranking:
    enabled: true
    type: "Bedrock-managed reranker"
    top_k_after_rerank: 5
    rationale: >
      Reranking improves precision by selecting the most relevant chunks from
      the broader semantic candidate set before generation. Compensates for the
      absence of hybrid (lexical + semantic) retrieval in the current design.
    fallback:
      - "If reranking is unavailable, system falls back to top semantic candidates"

  context_construction:
    max_chunks: 5
    ordering: "descending relevance"
    deduplication: true
    context_budget:
      rule: "Final assembled context must remain within model token limits"
      priority: >
        If token budget is constrained, prefer fewer high-relevance chunks over
        broader but noisier context.
    rules:
      - "Use only top reranked chunks in final generation context"
      - "Remove duplicate or near-duplicate chunks from the same source"
      - "Keep total context within model token budget"
      - "Prefer higher-relevance chunks over broader but noisier context"

  response_policy:
    grounding_mode: "strict"
    rules:
      - "Answer ONLY using retrieved tenant knowledge base content"
      - "Always include source citations when answering"
      - "Do not rely on knowledge outside retrieved tenant KB content or attached file evidence"
      - "Do not synthesize unsupported claims from partial evidence"

  failure_handling:
    no_relevant_results:
      response: "Return KB limitation message (aligned with guardrail grounding_failure_response)"
      example: '"I don''t have enough information in the knowledge base to answer that."'
    ambiguous_question:
      response: "Ask clarifying question before answering"
    partial_evidence:
      response: "Answer conservatively and state limits of available information"
    off_topic:
      response: "Decline and state assistant is limited to tenant documentation"
    no_fallback_generation: true

  tuning_guidance:
    note: >
      Retrieval quality should be tuned using known test questions and citation review.
      Do not change multiple parameters simultaneously without evaluation.
    first_parameters_to_tune:
      - "top_k_candidates"
      - "top_k_after_rerank"
      - "chunking strategy"
      - "document ingestion quality (source formatting, completeness)"

  observability:
    logs:
      - "Retrieved candidate chunk identifiers and top relevance score per request"
      - "Reranked chunk identifiers and final selected set"
      - "Citations / sources returned to user"
    metrics:
      - "Retrieval success rate (chunks found vs empty result)"
      - "Citation coverage rate per answered response"
      - "No-result / low-evidence rate"
      - "Average response latency (TTFT and total)"
      - "Answer-support mismatch rate (cases where retrieved evidence does not support generated answer)"
    evaluation:
      - "Maintain a small benchmark set of representative tenant questions"
      - "Review whether top retrieved chunks actually support the answer"
      - "Track retrieval regressions after any KB rebuild or chunking change"

# ============================================================
# Tenant Model
# ============================================================

tenant_model:
  description: >
    A tenant represents one organisation/team with its own isolated knowledge base,
    Bedrock Agent, S3 bucket, and Aurora vector schema.
    Tenants share: Aurora cluster, ECS API service, ALB.
    Tenants own: Agent, KB, S3 bucket, vector schema.

  config_shape:
    tenantId: "string — unique key (e.g. 'acme', 'contoso')"
    displayName: "string — shown in UI header"
    agentId: "string — Bedrock Agent resource ID (set by CDK output)"
    agentAliasId: "string — Bedrock Agent alias ID (set by CDK output)"
    guardrailId: "string — Bedrock Guardrail ID"
    s3BucketName: "string — document source bucket"
    kbId: "string — Bedrock KB ID"

  isolation_guarantees:
    api_layer: "tenantId read from server-side runtimeConfig env var — cannot be spoofed by browser caller"
    bedrock_agent: "Agent is associated with only one KB (its tenant's KB)"
    kb_layer: "KB points to only one Aurora schema (its tenant's schema)"
    aurora: "Schema-level isolation — bedrock user has GRANT on own schema only"
    s3: "Separate bucket per tenant with separate IAM policies"

  new_tenant_onboarding:
    steps:
      - "Add tenant entry to tenants array in CDK bin/app.ts"
      - "Add tenant config to TENANT_CONFIG env var on API service"
      - "Run cdk deploy — TenantStack creates S3, KB, Agent, schema, scheduler"
      - "Upload documents to S3 bucket"
      - "Trigger KB sync (or wait for daily schedule)"
      - "Deploy new Nuxt UI ECS task with NUXT_PUBLIC_TENANT_ID={tenantId}"
    estimated_time: "< 1 hour (after CDK deploy completes)"

# ============================================================
# Infrastructure Design (AWS CDK — TypeScript)
# ============================================================

infrastructure:
  provider: "AWS"
  region: "us-east-1"
  iac: "AWS CDK (TypeScript)"
  cdk_language_note: >
    Same language as app and API — no context switching.
    Share types between CDK config and application config.

  stacks:
    SharedStack:
      description: "Deployed once — shared resources across all tenants"
      resources:
        - "VPC (2 AZs, private + public subnets)"
        - "ECS Cluster (Fargate)"
        - "Application Load Balancer (internet-facing, public)"
        - "Aurora Serverless v2 cluster + admin secret (Secrets Manager)"
        - "Schema setup Lambda (creates app.sessions, app.messages, app.session_files on first deploy)"
        - "ECR repository: chat-platform (single Nuxt image)"
        - "S3 bucket: tenant-files-{env} (shared across tenants — chat attachments)"
        - "  Lifecycle rule: expire objects after 90 days"
        - "  Versioning: disabled (no need for attachment versioning)"
        - "  Encryption: SSE-S3"
        - "CloudWatch log group: /platform/chat"
        - "Bedrock Guardrail (shared)"
        - "SSM Parameters: /chatplatform/db-url, /chatplatform/tenant-config"

    TenantStack:
      description: "Deployed per tenant — parameterised by tenantId"
      instantiation: |
        // cdk/bin/app.ts
        const tenants = ['acme', 'contoso', 'fabrikam']
        for (const tenantId of tenants) {
          new TenantStack(app, `TenantStack-${tenantId}`, {
            tenantId,
            shared: sharedStack,
            env: { account, region }
          })
        }
      resources:
        - "S3 bucket: {tenantId}-docs-{env}"
        - "Bedrock Knowledge Base: {tenantId}-kb-{env}"
        - "Bedrock Agent: {tenantId}-agent-{env}"
        - "Bedrock Agent Alias: {tenantId}-agent-alias-{env}"
        - "Aurora schema setup Lambda: creates vectors_{tenantId}.bedrock_kb"
        - "EventBridge Scheduler: daily KB sync (bedrockagent:startIngestionJob)"
        - "IAM role: BedrockAgentRole — access only to this tenant's KB"
        - "IAM role: KBIngestionRole — access only to this tenant's S3 bucket"
        - "CloudWatch log group: /platform/tenant/{tenantId}"

    UIStack:
      description: "One ECS service per tenant (same image, different env vars)"
      resources:
        - "ECS Service: chat-{tenantId} (Nuxt SSR, port 3000)"
        - "ALB listener rule: host-header {tenantId}.platform.example.com"
        - "Environment variables:"
        - "  NUXT_PUBLIC_TENANT_ID={tenantId}"
        - "  NUXT_PUBLIC_TENANT_NAME={displayName}"
        - "  TENANT_CONFIG={json from Secrets Manager}"
        - "  DATABASE_URL={from Secrets Manager}"
        - "  AWS_REGION=us-east-1"
        - "CloudWatch log group: /platform/chat-ui/{tenantId}"
      note: >
        No separate API ECS service. Nuxt server routes run inside this task.
        Single Docker image — ECR tag chat-platform:latest used by all tenants.

  cdk_project_structure: |
    cdk/
    ├── bin/
    │   └── app.ts              # Entry point — instantiates all stacks
    ├── lib/
    │   ├── shared-stack.ts     # VPC, ECS, ALB, Aurora, ECR, Guardrail
    │   ├── tenant-stack.ts     # S3, KB, Agent, Aurora schema, Scheduler
    │   ├── ui-stack.ts         # Per-tenant Nuxt ECS service
    │   └── constructs/
    │       ├── bedrock-kb.ts   # CfnKnowledgeBase + CfnDataSource
    │       ├── bedrock-agent.ts # CfnAgent + CfnAgentAlias
    │       └── aurora-schema.ts # Lambda custom resource for schema setup
    ├── config/
    │   └── tenants.ts          # Tenant definitions (tenantId, displayName, etc.)
    ├── cdk.json
    └── tsconfig.json

  aurora:
    engine: "aurora-postgresql"
    engine_version: "16.4"
    serverless_scaling:
      min_capacity: 0.5
      max_capacity: 4
    storage_encrypted: true
    removal_policy: "RETAIN"
    backup_retention_days: 7
    data_api: true

  ecs:
    nuxt_service_per_tenant:
      cpu: 512
      memory_limit_mib: 1024
      desired_count: 1
      min_capacity: 1
      max_capacity: 4
      scaling_metric: "CpuUtilization > 70%"
      port: 3000
      note: "UI + server routes in one task. No separate API service."

  cicd:
    note: "Out of scope for PoC — manual docker build + cdk deploy"
    future: "GitHub Actions: build → ECR push → ECS rolling deploy"

# ============================================================
# Non-Functional Requirements
# ============================================================

non_functional_requirements:
  performance:
    - "Time to first token (TTFT): < 2 seconds"
    - "Streaming latency: < 100ms between tokens"
    - "Session history load: < 500ms"
    - "API health check: < 50ms"

  scalability:
    - "ECS API auto-scales 1–4 tasks on CPU > 70%"
    - "Aurora Serverless scales ACU on demand (0.5–4 ACU)"
    - "Target: 50 concurrent users per tenant PoC"
    - "Target: 500 concurrent users per tenant production"

  reliability:
    - "ECS multi-AZ placement (2 AZ minimum in production)"
    - "Aurora: automated failover to read replica"
    - "Bedrock: retry on ThrottlingException with exponential backoff (3 retries)"
    - "fetch() streaming: client retries with backoff on network error; passes existing sessionId to resume"

  observability:
    - "Structured JSON logs on every request: tenantId, userId, sessionId, durationMs"
    - "CloudWatch metrics: requests/min, error rate, TTFT — per tenantId"
    - "ECS health check: GET /health every 30s"
    - "Aurora Performance Insights enabled"
    rag_observability:
      - "Log retrieved and final selected chunk identifiers for debugging incorrect answers"
      - "Track no-result and low-evidence responses separately from hard errors"
      - "Measure citation coverage on answered responses"
      - "Flag responses where retrieval returned 0 chunks — leading indicator of KB quality issues"

  security:
    api_surface:
      - "ALB is internet-facing (public) — accessible from external networks for PoC development"
      - "HTTPS/TLS is infrastructure-layer — add ACM cert + HTTPS listener when domain is available; HTTP on port 80 is sufficient for PoC"
      - "tenantId baked into ECS task env var — cannot be overridden by browser caller"
      - "ECS task IAM role: s3:PutObject + s3:GetObject scoped to tenant-files-{env}/{tenantId}/* prefix only"
      - "No secrets in code or CDK assets — all in Secrets Manager or env vars"
      - "Bedrock Agent IAM role scoped to own KB ARN only (least privilege)"
      - "Aurora credentials in Secrets Manager — rotated automatically"
    data:
      - "TLS in transit (ALB → ECS via HTTPS within VPC)"
      - "Aurora encrypted at rest (KMS)"
      - "S3 buckets: private, encrypted, versioned"
      - "No PII logged (Guardrail PII filter active)"
    poc_relaxations:
      - "No mutual TLS between UI and API"
      - "Google OAuth userId trusted as-is (no server-side session validation)"
      - "ALB not WAF-protected (add AWS WAF before production use)"
      - "Authenticated direct Aurora access permitted for developers in dev/PoC environment (see DEC-009)"

  testing:
    - "Unit tests: BedrockAgentService, SessionService, TenantConfigService"
    - "Integration tests: POST /chat/stream end-to-end with mock Bedrock"
    - "Load test: 50 concurrent SSE streams (k6 or Artillery)"
    - "Framework: Vitest (TypeScript-native)"
    test_coverage_target: "70% for service layer"

