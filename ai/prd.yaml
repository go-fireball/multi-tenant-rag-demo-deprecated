# ============================================================
# Open Questions
# ============================================================

open_questions:
  - id: OQ-001
    question: "Will tenants need different AI models (Claude Haiku vs Sonnet)?"
    impact: "Add model field to TenantConfig — trivial change"
    default: "Claude 3 Haiku for all tenants (faster, cheaper)"

  - id: OQ-002
    question: "Should document upload in chat trigger KB ingestion or stay ephemeral?"
    status: RESOLVED
    answer: >
      Chat-uploaded files are stored in S3 and ALSO ingested into the tenant
      Bedrock KB with metadata tags (userId, sessionId, visibility). This allows
      users to search their own uploaded documents in future sessions via vector
      search, and the AI returns citations with S3 source paths. Visibility
      metadata controls who can retrieve what: private files are only retrievable
      by the uploader; shared files are retrievable by all tenant users. Files
      are also passed as session-state S3 references on the current turn for
      immediate use (before KB ingestion completes). S3 lifecycle expires files
      after 90 days; corresponding KB entries should be cleaned up on expiry.

  - id: OQ-003
    question: "Single ALB shared between UI and API, or separate?"
    impact: "Shared ALB with path/host routing is simpler and cheaper for PoC"
    default: "Shared ALB — /* routes to Nuxt (serves both UI and /api/* server routes)"

  - id: OQ-004
    question: "Do tenants need to see each other's existence?"
    impact: "Currently fully isolated — no cross-tenant visibility"
    default: "No — full isolation"

  - id: OQ-005
    question: "What is the target AWS account structure?"
    impact: "Single account with tenant isolation via IAM/schemas (current design)"
    default: "Single AWS account for PoC"

  - id: OQ-006
    question: "Is Nuxt 4 SSR needed or is SPA sufficient?"
    status: RESOLVED
    answer: >
      SSR is required — not optional. Nuxt server routes (server/api/*.ts)
      run inside the Nitro server process and cannot exist in SPA mode.
      Google OAuth session handling (nuxt-google-auth) also requires a server
      process. The Nuxt ECS task runs as an SSR Node.js server (port 3000)
      serving both the Vue UI and all server routes from the same process.
