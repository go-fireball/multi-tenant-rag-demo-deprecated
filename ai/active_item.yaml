id: ITEM-0001
title: Scaffold the Nuxt and CDK baseline for the multi-tenant RAG platform
goal: Establish a lean monorepo baseline with apps/web for Nuxt 4 and infra/cdk for AWS CDK so feature implementation can start on a real codebase
status: ready_for_judgment
owner_role: SENIOR_JUDGMENTAL_ENGINEER
related_files:
  - ai/goal.yaml
  - ai/prd.yaml
  - ai/backlog.yaml
  - ai/decision-lock.yaml
  - ai/next_agent.md
acceptance_criteria:
  - The active item scope is confirmed to use Nuxt 4 plus Nitro server routes and TypeScript CDK on AWS, overriding generic template defaults
  - Repo layout is explicitly normalized to apps/web for the application and infra/cdk for infrastructure, with a root workspace package manager setup
  - The first engineering slice is limited to workspace scaffolding, shared TypeScript/config setup, minimal Nuxt entrypoints, and placeholder CDK stack wiring only
  - No separate backend service, Lambda-based app logic, chat implementation, upload flow, Aurora integration, or Bedrock integration is included in this item
  - Handoff guidance is specific enough for ENGINEER to scaffold the baseline with no further planning ambiguity
done_definition:
  - Decision locks capture the approved stack, repo layout, and first-slice boundaries from ai/goal.yaml and ai/prd.yaml
  - Backlog keeps ITEM-0001 in progress and preserves sequenced follow-on items for chat, uploads, infrastructure, and validation
  - ai/next_agent.md tells the next role exactly what to validate and simplify before implementation
